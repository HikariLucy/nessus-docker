services:
  prometheus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prometheus-healthtrack
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      # Named Volume para persistir los datos de métricas (/prometheus)
      - prometheus_data:/prometheus
      # Bind Mount para montar la configuración desde el host
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    environment:
      - TZ=America/Santiago
      # Variable de entorno APP_ENV con valor "production"
      - APP_ENV=production

# Declara el named volume prometheus_data a nivel raíz
volumes:
  prometheus_data: